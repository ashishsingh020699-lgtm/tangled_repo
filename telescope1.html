<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Starry Night • Left-Middle Alignment</title>
<style>
  :root {
    --zoom-origin-x: 50vw;
    --zoom-origin-y: 50vh;
    --sky-1: #1a3b6e;
    --sky-2: #050a14;
    --silhouette: #000000;
    --ground: #020408;
  }

  body {
    margin: 0;
    height: 100vh;
    background: radial-gradient(circle at 50% 30%, var(--sky-1) 0%, #0d1f3d 50%, var(--sky-2) 100%);
    overflow: hidden;
  }

  .scene { position: relative; width: 100%; height: 100%; }

  /* ⭐ Twinkling Stars */
  .star {
    position: absolute; background: white; border-radius: 50%; opacity: 0;
    animation: twinkle var(--duration) ease-in-out infinite;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.2; transform: scale(0.7); }
    50% { opacity: 1; transform: scale(1.1); }
  }

  /* 🌒 Sky Moon (Click to Zoom) */
  .sky-moon {
    position: absolute; right: 8%; top: 8%;
    width: 60px; height: 60px; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #fff, #b0bace);
    box-shadow: 0 0 30px rgba(255,255,255,0.4);
    cursor: pointer; z-index: 10;
    transition: transform 0.3s ease;
  }
  .sky-moon:hover { transform: scale(1.1); }

  /* ⛰️ Foreground Hill */
  .hill {
    position: absolute; bottom: -2vh; left: -10%; width: 120%; height: 15vh;
    background: var(--ground); border-radius: 100% 100% 0 0 / 20% 20% 0 0; z-index: 1;
  }

  /* 🔭 Silhouette Group */
  .silhouette-svg {
    position: absolute; bottom: 5vh; left: 50%;
    transform: translateX(-50%); width: 100%; max-width: 900px; height: 600px;
    z-index: 2; pointer-events: none;
  }
  
  .shape { fill: var(--silhouette); }

  /* 🔍 Fullscreen Zoom Overlay */
  .moon-reveal {
    position: fixed; inset: 0; background: #050a14;
    clip-path: circle(0px at var(--zoom-origin-x) var(--zoom-origin-y));
    transition: clip-path 1s cubic-bezier(0.25, 1, 0.5, 1);
    z-index: 100; display: flex; align-items: center; justify-content: center;
    pointer-events: none; opacity: 0;
  }

  .zoomed .moon-reveal { 
    clip-path: circle(150% at var(--zoom-origin-x) var(--zoom-origin-y)); 
    opacity: 1; pointer-events: auto; 
  }
  
  .big-moon {
    width: 92vmin; height: 92vmin; border-radius: 50%;
    background: radial-gradient(circle at 50% 50%, #f0f4f8 0%, #d1d9e6 50%, #99a3b2 100%);
    box-shadow: 0 0 100px 20px rgba(255,255,255,0.3), inset -40px -40px 80px rgba(0,0,0,0.4);
    transform: scale(0.1); transition: transform 1.5s cubic-bezier(0.25, 1, 0.5, 1);
  }
  
  .zoomed .big-moon { transform: scale(1); }

  .close-btn {
    position: absolute; top: 30px; right: 30px; padding: 12px 24px;
    background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3);
    color: white; cursor: pointer; border-radius: 4px; z-index: 101;
  }
</style>
</head>
<body>

<div class="scene" id="scene">
  <div id="star-field"></div>
  <div class="sky-moon" id="skyMoon"></div>
  
  <svg class="silhouette-svg" viewBox="0 0 900 600">
    <g transform="translate(250, 550)">
      <path class="shape" d="M-5,-320 L-65,0 L-45,0 L-2,-300 Z" />
      <path class="shape" d="M5,-320 L65,0 L45,0 L2,-300 Z" />
      <rect class="shape" x="-3" y="-320" width="6" height="320" />
      <path class="shape" d="M-15,-320 L15,-320 L10,-340 L-10,-340 Z" />
    </g>

    <g transform="translate(250, 215) rotate(-15)">
      <rect class="shape" x="-140" y="-20" width="280" height="40" rx="2" />
      <rect class="shape" x="140" y="-25" width="45" height="50" rx="2" />
      <rect class="shape" x="-170" y="-12" width="30" height="24" rx="1" />
      <rect class="shape" x="-185" y="-8" width="15" height="16" rx="1" />
    </g>

    <g transform="translate(70, 550)">
      <path class="shape" d="M -25,0 L -15,-200 L 15,-200 L 25,0 L 12,0 L 5,-140 L -5,-140 L -12,0 Z" />
      <rect class="shape" x="-20" y="-320" width="45" height="130" rx="10" transform="rotate(-5, 5, -200)" />
      <circle class="shape" cx="10" cy="-345" r="32" />
      <path class="shape" d="M 5,-300 Q 50,-270 70,-280 L 140,-305 L 155,-295 L 90,-250 Q 40,-230 5,-270 Z" />
    </g>
  </svg>

  <div class="hill"></div>
</div>

<div class="moon-reveal" id="reveal">
  <button class="close-btn" id="closeBtn">Close</button>
  <div class="big-moon"></div>
</div>

<script>
  // Generate random stars
  const field = document.getElementById('star-field');
  for (let i = 0; i < 200; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    const size = Math.random() * 2 + 1;
    star.style.width = size + 'px';
    star.style.height = size + 'px';
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 80 + '%';
    star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
    star.style.animationDelay = Math.random() * 5 + 's';
    field.appendChild(star);
  }

  // Zoom Reveal Logic
  const skyMoon = document.getElementById('skyMoon');
  const closeBtn = document.getElementById('closeBtn');
  const root = document.documentElement;

  skyMoon.addEventListener('click', (e) => {
    // Set zoom origin to moon position
    const rect = skyMoon.getBoundingClientRect();
    root.style.setProperty('--zoom-origin-x', (rect.left + rect.width / 2) + 'px');
    root.style.setProperty('--zoom-origin-y', (rect.top + rect.height / 2) + 'px');
    document.body.classList.add('zoomed');
  });

  closeBtn.addEventListener('click', () => {
    document.body.classList.remove('zoomed');
  });
</script>

</body>
</html>
