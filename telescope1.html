<style>
  :root {
    --zoom-origin-x: 50vw;
    --zoom-origin-y: 50vh;
    --sky-1: #1a3b6e;
    --sky-2: #050a14;
    --silhouette: #000000;
    --ground: #020408;
  }

  body {
    margin: 0;
    height: 100vh;
    background: radial-gradient(circle at 50% 30%, var(--sky-1) 0%, #0d1f3d 50%, var(--sky-2) 100%);
    overflow: hidden;
    font-family: Arial, sans-serif;
  }

  .scene {
    position: relative;
    width: 100%;
    height: 100%;
  }

  /* ⭐ Twinkling Stars */
  .star {
    position: absolute;
    background: white;
    border-radius: 50%;
    opacity: 0;
    animation: twinkle var(--duration) ease-in-out infinite;
  }

  @keyframes twinkle {
    0%, 100% {
      opacity: 0.2;
      transform: scale(0.7);
    }

    50% {
      opacity: 1;
      transform: scale(1.1);
    }
  }

  /* 🌒 Small Sky Moon */
  .sky-moon {
    position: abso*ute;
    right: 8%;
    top: 8%;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #fff, #b0bace);
    box-shadow: 0 0 30px rgba(255,255,255,0.4);
    cursor: pointer;
    z-index: 10;
    transition: transform 0.3s ease;
  }

  .sky-moon:hover {
    transform: scale(1.1);
  }

  .moon-hint {
    position: absolute;
    right: 5%;
    top: calc(8% + 75px);
    color: rgba(255,255,255,0.75);
    font-size: 14px;
    z-index: 10;
    letter-spacing: 0.3px;
  }

  /* ⛰️ Foreground Hill */
  .hill {
    position: absolute;
    bottom: -2vh;
    left: -10%;
    width: 120%;
    height: 15vh;
    background: var(--ground);
    border-radius: 100% 100% 0 0 / 20% 20% 0 0;
    z-index: 1;
  }

  /* 🔭 Silhouette Group */
  .silhouette-svg {
    position* absolute;
    bottom: 5vh;
    le*t: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 900px;
    height: 600px;
    z-index: 2;
    pointer-events: none;
  }

  .shape {
    fill: var(--silhouette);
  }

  /* 🔍 Fullscreen Zoom Overlay */
  .moon-reveal {
    position: f*xed;
    inset: 0;
    background:*#050a14;
    clip-path: circle(0px*at var(--zoom-origin-x) var(--zoom*origin-y));
    transition: clip-p*th 1s cubic-bezier(0.25, 1, 0.5, 1*, opacity 0.3s ease;
    z-index: *00;
    display: flex;
    align-i*ems: center;
    justify-content: *enter;
    pointer-events: none;
    opacity: 0;
  }

  .zoomed .moon-reveal {
    clip-path: circle(150% at var(--zoom-origin-x) var(--zoom-origin-y));
    opacity: 1;
    pointer-events: auto;
  }

  /* Container holding big moon and image */
  .moon-content {
    position:*relative;
    width: 92vmin;
    height: 92vmin;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* 🌕 Big Moon */
  .big-moon {
    position: abso*ute;
    width: 92vmin;
    height* 92vmin;
    border-radius: 50%;
 *  background: radial-gradient(circ*e at 50% 50%, #f0f4f8 0%, #d1d9e6 *0%, #99a3b2 100%);

    position: ab*olute;
    width* 52%;

   *object-fit: cover;
